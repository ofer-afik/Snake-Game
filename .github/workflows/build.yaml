name: Build Snake-Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies on Ubuntu
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential git libopenal-dev libudev-dev libx11-dev libxcb1-dev libxcb-glx0-dev libxcursor-dev libxrandr-dev libxi-dev libxinerama-dev libgl1-mesa-dev

      - name: Install dependencies on macOS
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install cmake

      - name: Install dependencies on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install -y cmake git
          refreshenv

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build executable
        run: cmake --build build --config Release --parallel

      - name: Display build result on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem -Path build\bin

      - name: Display build result on Linux/macOS
        if: matrix.os != 'windows-latest'
        run: |
          ls build/bin

      - name: Upload Linux/Windows artifacts
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Snake-Game-${{ matrix.os }}
          path: build/bin

      - name: Upload macOS app
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Snake-Game-macos-latest
          path: build/bin/Snake-Game.app