name: Cross-Platform Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Dependency Installation ---
      
      - name: Install Dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libxkbcommon-dev

      - name: Install raylib (vcpkg for Windows/Mac)
        if: matrix.os != 'ubuntu-latest'
        run: vcpkg install raylib

      - name: Install raylib (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib/src
          make PLATFORM=PLATFORM_DESKTOP
          sudo make install

      # --- Compilation Step ---

      - name: Build Project (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          g++ main.cpp button.cpp -o game.exe -lraylib -lgdi32 -lwinmm

      - name: Build Project (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          g++ main.cpp button.cpp -o game -lraylib -lGL -lm -lpthread -ldl -lrt -lX11

      - name: Build Project (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          g++ main.cpp button.cpp -o game -lraylib -framework IOKit -framework Cocoa -framework OpenGL

      # --- Artifact Upload ---

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: manual-build-${{ matrix.os }}
          path: |
            game
            game.exe